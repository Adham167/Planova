name: planova_app
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  cloud_firestore: ^6.3.0
  cupertino_icons: ^1.0.8
  device_preview: ^1.3.1
  firebase_auth: ^6.4.0
  firebase_core: ^4.7.0
  flutter:
    sdk: flutter
  flutter_assets: ^0.0.6
  flutter_svg: ^2.2.4
  flutter_bloc: ^8.1.6
  get_it: ^7.6.0
  go_router: ^17.1.0
  google_fonts: ^6.2.1
  intl: ^0.20.2
  meta: ^1.10.0
  percent_indicator: ^4.2.5
  provider: ^6.1.1
  timeago: ^3.7.1
  top_snackbar_flutter: ^3.3.0
  bloc: ^8.1.0
  dartz: ^0.10.1
  firebase_storage: ^13.4.3

dev_dependencies:
  flutter:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  # ❗ سيبها بس لو هتستخدم fonts محليًا
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

flutter_assets:
  assets_path: assets/images
  output_path: lib/core/constants
  filename: assets.dart
  field_prefix: null

flutter_launcher_icons:
  image_path: "assets/images/icon.png"
  android: true
  ios: true

  adaptive_icon_background: "#FFFFFF"

  remove_alpha_ios: true
