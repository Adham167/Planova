name: planova_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  device_preview: ^1.3.1
  flutter_assets: ^0.0.6
  flutter_svg: ^2.2.4
  go_router: ^17.1.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_assets:
  assets_path: assets/images
  output_path: lib/core/constants
  filename: assets.dart
  field_prefix: null