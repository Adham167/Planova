name: planova_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  device_preview: ^1.3.1
  flutter_assets: ^0.0.6
  flutter_svg: ^2.2.4
  go_router: ^17.1.0

  # merged
  google_fonts: ^6.2.1
  intl: ^0.20.2
  percent_indicator: ^4.2.5

dev_dependencies:
  flutter:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  # ❗ سيبها بس لو هتستخدم fonts محليًا
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

flutter_assets:
  assets_path: assets/images
  output_path: lib/core/constants
  filename: assets.dart
  field_prefix: null